# Supplementary table → reproduction mapping (R2 docx numbering)
# verify: full | frozen | hash_only

S1:
  status: reproducible
  source_csv: data/connectivity_roi_list.csv
  script: code/extract_manuscript_claims.py
  note: Connectivity ROI atlas (MNI coordinates); exported from supplementary docx Table S1

S2:
  status: reproducible
  source_csv: output/tables/supp_table_cadss_mixed_model.csv
  script: code/01_pain_ketamine_analysis_temp_covariate.r
  key_col: Effect
  columns:
    Effect: Effect
    df: df
    F: F
    p: p

S3:
  status: reproducible
  source_csv: output/tables/cadss_posthoc_session_contrasts.csv
  script: code/01_pain_ketamine_analysis_temp_covariate.r
  key_col: contrast
  match_cols:
    - { ms: time_point, csv: time_point }
    - { ms: estimate, csv: estimate, tol: 0.05 }
    - { ms: t.ratio, csv: t.ratio, tol: 0.05 }
    - { ms: p.value, csv: p.value, tol: 0.01 }

