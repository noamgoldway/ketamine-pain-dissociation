  key_col: outcome
  note: >
    Supplementary Table S14 in the R2 docx reports NPS multivariate model fit
    (Adj R² / AIC). Temp-adjusted pain ratings (calib_temp p = 0.070) are in
    output/tables/supp_table_tempadj_pain_model.csv and checked in verify-all.

in_text_anchors:
  - name: pain_interaction_F
    doc: main
    pattern: "F( 1,54) = 11.22"
    csv: output/tables/pain_ratings_mixed_model_anova.csv
    lookup: { effect_contains: "intensity1:session1", col: F, expected: 11.22, tol: 0.15 }
  - name: cadss_session_F
    doc: main
    pattern: "F( 1,32) = 57.44"
    csv: output/tables/supp_table_cadss_mixed_model.csv
    lookup: { effect_contains: "session1", col: F, expected: 57.44, tol: 0.5 }
  - name: s1_pearson_r
    doc: supplementary
    csv: data/CADSS_Weight_DoseEquivalence_Data.csv
    recomputed: true
  - name: weight_demog
    doc: main
    csv: data/participants.csv
    recomputed: true
